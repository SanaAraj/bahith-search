<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باحث — Bahith</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #0a0b10;
            color: #e5e7eb;
            direction: rtl;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 38px;
            font-weight: 700;
            color: #f0fdf4;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #4b5563;
            margin-top: 6px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .suggestions {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            left: 56px;
            margin-top: 4px;
            background: #12141d;
            border: 1px solid #1c1f2e;
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 10px 16px;
            font-size: 13px;
            color: #d1d5db;
            cursor: pointer;
            transition: background 0.15s;
        }

        .suggestion-item:hover {
            background: #1c1f2e;
        }

        .suggestion-item.history {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestion-item svg {
            flex-shrink: 0;
        }

        .clear-history {
            padding: 8px 16px;
            font-size: 11px;
            color: #6b7280;
            cursor: pointer;
            border-top: 1px solid #1c1f2e;
            text-align: center;
        }

        .clear-history:hover {
            color: #f87171;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            font-size: 15px;
            font-family: inherit;
            direction: rtl;
            background: #12141d;
            border: 1.5px solid #1c1f2e;
            border-radius: 10px;
            color: #e5e7eb;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder {
            color: #4b5563;
        }

        .search-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .search-btn {
            padding: 14px 28px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .search-btn:hover {
            background: #059669;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .modes {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 10px;
        }

        .mode-btn {
            font-size: 11px;
            font-family: inherit;
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #12141d;
            color: #6b7280;
            border: 1px solid #1c1f2e;
        }

        .mode-btn:hover {
            border-color: #10b981;
            color: #9ca3af;
        }

        .mode-btn.active {
            background: #10b981;
            color: #fff;
            border: 1px solid #10b981;
        }

        .hint {
            font-size: 12px;
            color: #374151;
            text-align: center;
            margin-top: 2rem;
        }

        .loading {
            display: none;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            font-size: 13px;
            color: #6b7280;
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #1c1f2e;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            display: none;
            font-size: 13px;
            color: #f87171;
            text-align: center;
            margin-top: 8px;
        }

        .error-msg.show {
            display: block;
        }

        .results-container {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .results-container.show {
            opacity: 1;
        }

        .ai-answer {
            margin-top: 1.5rem;
            background: #12141d;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            border-right: 3px solid #10b981;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .ai-label {
            font-size: 11px;
            color: #10b981;
            font-weight: 600;
        }

        .confidence {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
        }

        .confidence-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .confidence-high { background: #34d399; }
        .confidence-high + span { color: #34d399; }
        .confidence-mid { background: #fbbf24; }
        .confidence-mid + span { color: #fbbf24; }
        .confidence-low { background: #f87171; }
        .confidence-low + span { color: #f87171; }

        .ai-text {
            font-size: 14px;
            color: #d1d5db;
            line-height: 1.9;
        }

        .ai-sources {
            font-size: 11px;
            color: #374151;
            margin-top: 10px;
        }

        .analytics-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 12px 0;
            margin: 1rem 0;
            border-top: 1px solid #1c1f2e;
            border-bottom: 1px solid #1c1f2e;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat svg {
            flex-shrink: 0;
        }

        .stat span {
            font-size: 12px;
            color: #6b7280;
        }

        .results-header {
            display: none;
        }

        .results-list {
            display: flex;
            flex-direction: column;
        }

        .result-card {
            background: #12141d;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 8px;
            border: 1px solid #1c1f2e;
            transition: border-color 0.2s;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }

        .result-card:hover {
            border-color: rgba(16, 185, 129, 0.25);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .result-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-title {
            font-size: 14.5px;
            font-weight: 600;
            color: #10b981;
            margin: 0;
        }

        .score-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
        }

        .score-green {
            background: rgba(5, 46, 22, 0.5);
            color: #34d399;
        }

        .score-amber {
            background: rgba(66, 32, 6, 0.5);
            color: #fbbf24;
        }

        .score-red {
            background: rgba(80, 19, 19, 0.5);
            color: #f87171;
        }

        .result-snippet {
            font-size: 12.5px;
            color: #9ca3af;
            line-height: 1.7;
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-source {
            font-size: 10.5px;
            color: #374151;
            margin-top: 8px;
        }

        .related-searches {
            margin-top: 1.5rem;
        }

        .related-title {
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .related-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-pill {
            background: #12141d;
            border: 1px solid #1c1f2e;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.15s;
        }

        .related-pill:hover {
            border-color: #10b981;
            color: #d1d5db;
        }

        mark {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            padding: 1px 3px;
            border-radius: 3px;
        }

        .keyboard-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #374151;
        }

        .keyboard-hint kbd {
            background: #1c1f2e;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
        }

        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
        }

        .empty-state.show {
            display: flex;
        }

        .empty-state svg {
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
            color: #4b5563;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>باحث</h1>
            <p class="subtitle">Bahith — Arabic semantic search engine</p>
        </header>

        <div class="search-wrapper">
            <div class="search-box">
                <input type="text" class="search-input" id="query" placeholder="...ابحث في المحتوى العربي" autocomplete="off">
                <button class="search-btn" id="searchBtn">بحث</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="modes">
            <button class="mode-btn active" data-mode="hybrid">هجين</button>
            <button class="mode-btn" data-mode="semantic">دلالي</button>
            <button class="mode-btn" data-mode="keyword">كلمات</button>
            <button class="mode-btn" data-mode="web">ويب</button>
        </div>

        <p class="error-msg" id="errorMsg">حدث خطأ، حاول مرة أخرى</p>

        <p class="hint" id="hint">ابحث عن أي موضوع باللغة العربية</p>

        <div class="loading" id="loading">
            <span>جاري البحث...</span>
            <div class="spinner"></div>
        </div>

        <div class="empty-state" id="emptyState">
            <svg width="40" height="40" fill="none" stroke="#374151" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <p>لم يتم العثور على نتائج</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="ai-answer" id="aiAnswer">
                <div class="ai-header">
                    <div class="ai-label">إجابة ذكية</div>
                    <div class="confidence" id="confidence"></div>
                </div>
                <div class="ai-text" id="aiText"></div>
                <div class="ai-sources" id="aiSources"></div>
            </div>

            <div class="analytics-bar" id="analyticsBar">
                <div class="stat">
                    <svg width="14" height="14" fill="none" stroke="#4b5563" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span id="statResults">0 نتائج</span>
                </div>
                <div class="stat">
                    <svg width="14" height="14" fill="none" stroke="#4b5563" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    <span id="statTime">0 ثانية</span>
                </div>
                <div class="stat">
                    <svg width="14" height="14" fill="none" stroke="#4b5563" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <span id="statMode">هجين</span>
                </div>
            </div>

            <div class="results-header" id="resultsHeader"></div>

            <div class="results-list" id="resultsList"></div>

            <div class="related-searches" id="relatedSearches" style="display: none;">
                <div class="related-title">عمليات بحث مرتبطة</div>
                <div class="related-pills" id="relatedPills"></div>
            </div>
        </div>

        <div class="keyboard-hint">اضغط <kbd>/</kbd> للبحث</div>
    </div>

    <script>
        let currentMode = 'hybrid';
        let debounceTimer = null;
        const queryInput = document.getElementById('query');
        const searchBtn = document.getElementById('searchBtn');
        const suggestions = document.getElementById('suggestions');
        const hint = document.getElementById('hint');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const emptyState = document.getElementById('emptyState');
        const resultsContainer = document.getElementById('resultsContainer');
        const aiAnswer = document.getElementById('aiAnswer');
        const aiText = document.getElementById('aiText');
        const aiSources = document.getElementById('aiSources');
        const confidenceEl = document.getElementById('confidence');
        const resultsHeader = document.getElementById('resultsHeader');
        const resultsList = document.getElementById('resultsList');
        const relatedSearches = document.getElementById('relatedSearches');
        const relatedPills = document.getElementById('relatedPills');
        const statResults = document.getElementById('statResults');
        const statTime = document.getElementById('statTime');
        const statMode = document.getElementById('statMode');

        const modeLabels = {
            'hybrid': 'هجين',
            'semantic': 'دلالي',
            'keyword': 'كلمات',
            'web': 'ويب'
        };

        function getSearchHistory() {
            try {
                return JSON.parse(localStorage.getItem('searchHistory') || '[]');
            } catch { return []; }
        }

        function saveToHistory(query) {
            let history = getSearchHistory();
            history = history.filter(h => h !== query);
            history.unshift(query);
            history = history.slice(0, 5);
            localStorage.setItem('searchHistory', JSON.stringify(history));
        }

        function clearHistory() {
            localStorage.removeItem('searchHistory');
            suggestions.classList.remove('show');
        }

        function highlightTerms(text, query) {
            const words = query.split(/\s+/).filter(w => w.length > 1);
            let result = text;
            words.forEach(word => {
                const regex = new RegExp(`(${word})`, 'gi');
                result = result.replace(regex, '<mark>$1</mark>');
            });
            return result;
        }

        function showHistory() {
            const history = getSearchHistory();
            if (history.length === 0) return;

            suggestions.innerHTML = history.map(h => `
                <div class="suggestion-item history" data-query="${h}">
                    <svg width="14" height="14" fill="none" stroke="#4b5563" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    <span>${h}</span>
                </div>
            `).join('') + '<div class="clear-history" onclick="clearHistory()">مسح السجل</div>';
            suggestions.classList.add('show');
        }

        async function fetchSuggestions(q) {
            if (q.length < 2) {
                suggestions.classList.remove('show');
                return;
            }
            try {
                const resp = await fetch(`/suggest?q=${encodeURIComponent(q)}`);
                const data = await resp.json();
                if (data.suggestions.length > 0) {
                    suggestions.innerHTML = data.suggestions.map(s => `
                        <div class="suggestion-item" data-query="${s}">${s}</div>
                    `).join('');
                    suggestions.classList.add('show');
                } else {
                    suggestions.classList.remove('show');
                }
            } catch {}
        }

        queryInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const q = queryInput.value.trim();
            if (q.length === 0) {
                showHistory();
            } else {
                debounceTimer = setTimeout(() => fetchSuggestions(q), 300);
            }
        });

        queryInput.addEventListener('focus', () => {
            if (queryInput.value.trim() === '') {
                showHistory();
            }
        });

        suggestions.addEventListener('click', e => {
            const item = e.target.closest('.suggestion-item');
            if (item) {
                queryInput.value = item.dataset.query;
                suggestions.classList.remove('show');
                doSearch();
            }
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('.search-wrapper')) {
                suggestions.classList.remove('show');
            }
            const relatedPill = e.target.closest('.related-pill');
            if (relatedPill) {
                queryInput.value = relatedPill.dataset.query;
                doSearch();
            }
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        queryInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                suggestions.classList.remove('show');
                doSearch();
            }
        });

        searchBtn.addEventListener('click', () => {
            suggestions.classList.remove('show');
            doSearch();
        });

        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement !== queryInput) {
                e.preventDefault();
                queryInput.focus();
            }
            if (e.key === 'Escape') {
                queryInput.value = '';
                queryInput.blur();
                suggestions.classList.remove('show');
            }
        });

        async function doSearch() {
            const query = queryInput.value.trim();

            if (!query) {
                queryInput.classList.add('shake');
                setTimeout(() => queryInput.classList.remove('shake'), 300);
                return;
            }

            saveToHistory(query);
            hint.style.display = 'none';
            errorMsg.classList.remove('show');
            emptyState.classList.remove('show');
            resultsContainer.classList.remove('show');
            loading.classList.add('show');

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, mode: currentMode, top_k: 5 })
                });

                if (!response.ok) throw new Error('Search failed');

                const data = await response.json();

                loading.classList.remove('show');

                if (data.results.length === 0) {
                    emptyState.classList.add('show');
                    return;
                }

                if (data.answer) {
                    aiText.textContent = data.answer;
                    const sources = data.results.slice(0, 3).map((_, i) => `نتيجة ${i + 1}`).join('، ');
                    aiSources.textContent = `المصادر: ${sources}`;

                    const conf = data.confidence || 7;
                    let confClass, confText;
                    if (conf >= 7) {
                        confClass = 'confidence-high';
                        confText = 'إجابة موثوقة';
                    } else if (conf >= 4) {
                        confClass = 'confidence-mid';
                        confText = 'إجابة جزئية';
                    } else {
                        confClass = 'confidence-low';
                        confText = 'معلومات محدودة';
                    }
                    confidenceEl.innerHTML = `<div class="confidence-dot ${confClass}"></div><span>${confText}</span>`;

                    aiAnswer.style.display = 'block';
                } else {
                    aiAnswer.style.display = 'none';
                }

                if (data.related_queries && data.related_queries.length > 0) {
                    relatedPills.innerHTML = data.related_queries.map(q =>
                        `<div class="related-pill" data-query="${q}">${q}</div>`
                    ).join('');
                    relatedSearches.style.display = 'block';
                } else {
                    relatedSearches.style.display = 'none';
                }

                statResults.textContent = `${data.total_results} نتائج`;
                statTime.textContent = `${data.search_time} ثانية`;
                statMode.textContent = modeLabels[data.mode] || data.mode;

                resultsList.innerHTML = '';
                data.results.forEach((r, index) => {
                    const scorePercent = (r.score * 100).toFixed(1);
                    let scoreClass = 'score-red';
                    if (r.score >= 0.85) scoreClass = 'score-green';
                    else if (r.score >= 0.6) scoreClass = 'score-amber';

                    const highlightedSnippet = highlightTerms(r.snippet, query);

                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.style.animationDelay = `${index * 50}ms`;
                    card.innerHTML = `
                        <div class="result-top">
                            <h3 class="result-title">${r.title}</h3>
                            <span class="score-badge ${scoreClass}">${scorePercent}%</span>
                        </div>
                        <p class="result-snippet">${highlightedSnippet}</p>
                        <p class="result-source">${r.source}</p>
                    `;
                    resultsList.appendChild(card);
                });

                resultsContainer.classList.add('show');

            } catch (err) {
                loading.classList.remove('show');
                errorMsg.classList.add('show');
            }
        }
    </script>
</body>
</html>
