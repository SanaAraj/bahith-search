<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باحث — Bahith</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #0a0b10;
            color: #e5e7eb;
            direction: rtl;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 38px;
            font-weight: 700;
            color: #f0fdf4;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #4b5563;
            margin-top: 6px;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            font-size: 15px;
            font-family: inherit;
            direction: rtl;
            background: #12141d;
            border: 1.5px solid #1c1f2e;
            border-radius: 10px;
            color: #e5e7eb;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder {
            color: #4b5563;
        }

        .search-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .search-btn {
            padding: 14px 28px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .search-btn:hover {
            background: #059669;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .modes {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 10px;
        }

        .mode-btn {
            font-size: 11px;
            font-family: inherit;
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #12141d;
            color: #6b7280;
            border: 1px solid #1c1f2e;
        }

        .mode-btn:hover {
            border-color: #10b981;
            color: #9ca3af;
        }

        .mode-btn.active {
            background: #10b981;
            color: #fff;
            border: 1px solid #10b981;
        }

        .hint {
            font-size: 12px;
            color: #374151;
            text-align: center;
            margin-top: 2rem;
        }

        .loading {
            display: none;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            font-size: 13px;
            color: #6b7280;
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #1c1f2e;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            display: none;
            font-size: 13px;
            color: #f87171;
            text-align: center;
            margin-top: 8px;
        }

        .error-msg.show {
            display: block;
        }

        .results-container {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .results-container.show {
            opacity: 1;
        }

        .ai-answer {
            margin-top: 1.5rem;
            background: #12141d;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            border-right: 3px solid #10b981;
        }

        .ai-label {
            font-size: 11px;
            color: #10b981;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .ai-text {
            font-size: 14px;
            color: #d1d5db;
            line-height: 1.9;
        }

        .ai-sources {
            font-size: 11px;
            color: #374151;
            margin-top: 10px;
        }

        .results-header {
            display: flex;
            justify-content: center;
            padding: 12px 0;
            font-size: 12px;
            color: #4b5563;
        }

        .results-list {
            display: flex;
            flex-direction: column;
        }

        .result-card {
            background: #12141d;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 8px;
            border: 1px solid #1c1f2e;
            transition: border-color 0.2s;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }

        .result-card:hover {
            border-color: rgba(16, 185, 129, 0.25);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .result-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-title {
            font-size: 14.5px;
            font-weight: 600;
            color: #10b981;
            margin: 0;
        }

        .score-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
        }

        .score-green {
            background: rgba(5, 46, 22, 0.5);
            color: #34d399;
        }

        .score-amber {
            background: rgba(66, 32, 6, 0.5);
            color: #fbbf24;
        }

        .score-red {
            background: rgba(80, 19, 19, 0.5);
            color: #f87171;
        }

        .result-snippet {
            font-size: 12.5px;
            color: #9ca3af;
            line-height: 1.7;
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-source {
            font-size: 10.5px;
            color: #374151;
            margin-top: 8px;
        }

        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
        }

        .empty-state.show {
            display: flex;
        }

        .empty-state svg {
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
            color: #4b5563;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>باحث</h1>
            <p class="subtitle">Bahith — Arabic semantic search engine</p>
        </header>

        <div class="search-box">
            <input type="text" class="search-input" id="query" placeholder="...ابحث في المحتوى العربي">
            <button class="search-btn" id="searchBtn">بحث</button>
        </div>

        <div class="modes">
            <button class="mode-btn active" data-mode="hybrid">هجين</button>
            <button class="mode-btn" data-mode="semantic">دلالي</button>
            <button class="mode-btn" data-mode="keyword">كلمات</button>
            <button class="mode-btn" data-mode="web">ويب</button>
        </div>

        <p class="error-msg" id="errorMsg">حدث خطأ، حاول مرة أخرى</p>

        <p class="hint" id="hint">ابحث عن أي موضوع باللغة العربية</p>

        <div class="loading" id="loading">
            <span>جاري البحث...</span>
            <div class="spinner"></div>
        </div>

        <div class="empty-state" id="emptyState">
            <svg width="40" height="40" fill="none" stroke="#374151" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <p>لم يتم العثور على نتائج</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="ai-answer" id="aiAnswer">
                <div class="ai-label">إجابة ذكية</div>
                <div class="ai-text" id="aiText"></div>
                <div class="ai-sources" id="aiSources"></div>
            </div>

            <div class="results-header" id="resultsHeader"></div>

            <div class="results-list" id="resultsList"></div>
        </div>
    </div>

    <script>
        let currentMode = 'hybrid';
        const queryInput = document.getElementById('query');
        const searchBtn = document.getElementById('searchBtn');
        const hint = document.getElementById('hint');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const emptyState = document.getElementById('emptyState');
        const resultsContainer = document.getElementById('resultsContainer');
        const aiAnswer = document.getElementById('aiAnswer');
        const aiText = document.getElementById('aiText');
        const aiSources = document.getElementById('aiSources');
        const resultsHeader = document.getElementById('resultsHeader');
        const resultsList = document.getElementById('resultsList');

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        queryInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') doSearch();
        });

        searchBtn.addEventListener('click', doSearch);

        async function doSearch() {
            const query = queryInput.value.trim();

            if (!query) {
                queryInput.classList.add('shake');
                setTimeout(() => queryInput.classList.remove('shake'), 300);
                return;
            }

            hint.style.display = 'none';
            errorMsg.classList.remove('show');
            emptyState.classList.remove('show');
            resultsContainer.classList.remove('show');
            loading.classList.add('show');

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, mode: currentMode, top_k: 5 })
                });

                if (!response.ok) throw new Error('Search failed');

                const data = await response.json();

                loading.classList.remove('show');

                if (data.results.length === 0) {
                    emptyState.classList.add('show');
                    return;
                }

                if (data.answer) {
                    aiText.textContent = data.answer;
                    const sources = data.results.slice(0, 3).map((_, i) => `نتيجة ${i + 1}`).join('، ');
                    aiSources.textContent = `المصادر: ${sources}`;
                    aiAnswer.style.display = 'block';
                } else {
                    aiAnswer.style.display = 'none';
                }

                resultsHeader.textContent = `${data.total_results} نتائج — ${data.search_time} ثانية`;

                resultsList.innerHTML = '';
                data.results.forEach((r, index) => {
                    const scorePercent = (r.score * 100).toFixed(1);
                    let scoreClass = 'score-red';
                    if (r.score >= 0.85) scoreClass = 'score-green';
                    else if (r.score >= 0.6) scoreClass = 'score-amber';

                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.style.animationDelay = `${index * 50}ms`;
                    card.innerHTML = `
                        <div class="result-top">
                            <h3 class="result-title">${r.title}</h3>
                            <span class="score-badge ${scoreClass}">${scorePercent}%</span>
                        </div>
                        <p class="result-snippet">${r.snippet}</p>
                        <p class="result-source">${r.source}</p>
                    `;
                    resultsList.appendChild(card);
                });

                resultsContainer.classList.add('show');

            } catch (err) {
                loading.classList.remove('show');
                errorMsg.classList.add('show');
            }
        }
    </script>
</body>
</html>
